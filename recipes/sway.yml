---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: workstation-sway
description: Personal workstation using Sway

base-image: ghcr.io/ublue-os/base-main
image-version: 44

modules:
  - from-file: common-modules.yml

  - type: dnf
    group-install:
      allow-erasing: true
      packages:
        - swaywm
        - swaywm-extended
    install:
      packages:
        - brightnessctl
        - matugen
        - rofi
        - sway-contrib
        - wiremix

  - type: systemd
    system:
      enabled:
        - sddm.service

  - type: signing
